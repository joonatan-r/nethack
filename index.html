<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Nethack</title>
    <style>
        * {
            touch-action: manipulation;
        }
        html {
            position: relative;
            min-height: 100%;
            height: 100%;
        }
        body {
            background-color: black;
            color: white;
            font-family: Courier, monospace;
            font-size: 20px;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        #root div {
            float: left;
            width: 12px;
            height: 22px;
        }
        #msg {
            white-space: pre;
        }
        #container {
            display: flex;
            flex-direction: column;
        }
        #header {
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow: auto;
            overscroll-behavior: contain;
            font-size: 10px;
        }
        #footerMsg {
            font-size: 16px;
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow: auto;
            overscroll-behavior: contain;
        }
        #footer {
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow-x: auto;
            overflow-y: hidden;
            overscroll-behavior: contain;
            display: flex;
            flex-direction: row;
        }
        #dialog {
            position: absolute;
            margin: 0;
            padding: 0;
            border: 1px solid lightgray;
            overflow: scroll;
            overscroll-behavior: contain;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
  </head>
  <body>
    <div id="header"></div>
    <div id="footerMsg"></div>
    <div id="footer"></div>
    <div id="dialog"></div>
    <div id="container">
        <div id="status"></div>
        <div id="root"></div>
        <div id="msg"></div>
        <div id="menus"></div>
    </div>
  </body>
  <script type="module" src="./wasm/nethack.js"></script>
  <script type="module">

import factory from "./wasm/nethack.js";

let mobile = !document.location.href.endsWith("#pc");
let mobileKbOn = true;
let shift = false;
let ctrl = false;
let dialogOn = false;
let lockCamera = false;
let rootBaseMarginTop = 0;
let footerHeight = 0;
let synced = false;
let syncResolve;
const syncPromise = new Promise(r => { syncResolve = r; });
const autoQueue = [];
const autoLookMsgs = [];
let autoLookAction = false;
const Module = {};
let storedFS;
let inputResolve;
let isCmdInput = false;
let cmdInput = "";
const rowno = 21;
const colno = 80;
let curs;
let cursColor = "darkgreen";
const colorsByCoords = {};
const selectorsByMenu = {};
const incSelectionsByMenu = {};
const statusMap = {};
let condsMap = {};
let msg = document.getElementById("msg");
const root = document.getElementById("root");
let menus = document.getElementById("menus");
let status = document.getElementById("status");
const header = document.getElementById("header");
const footer = document.getElementById("footer");
const footerMsg = document.getElementById("footerMsg");
const dialog = document.getElementById("dialog");

function handleKey(inputKey, ctrlKey, numPad) {
    if (inputResolve) {
        if (isCmdInput) {
            if (inputKey === 'Enter') {
                inputResolve(getExtCmdIdx(cmdInput));
            } else if (inputKey === 'Escape') {
                inputResolve(-1);
            } else if (inputKey.length === 1) {
                cmdInput += inputKey;
                msg.innerHTML = "#" + cmdInput;
            }
        } else if (inputKey.length === 1) {
            let key = (numPad && {
                1: 'b',
                2: 'j',
                3: 'n',
                4: 'h',
                6: 'l',
                7: 'y',
                8: 'k',
                9: 'u',
            }[inputKey]) || inputKey;
            let code = key.charCodeAt(0);
            if (ctrlKey) {
                code -= 96;
            }
            inputResolve(code);
        } else {
            let key = {
                Escape: 27,
                Enter: 13,
                End: 'B'.charCodeAt(0),
                ArrowDown: 'J'.charCodeAt(0),
                PageDown: 'N'.charCodeAt(0),
                ArrowLeft: 'H'.charCodeAt(0),
                ArrowRight: 'L'.charCodeAt(0),
                Home: 'Y'.charCodeAt(0),
                ArrowUp: 'K'.charCodeAt(0),
                PageUp: 'U'.charCodeAt(0)
            }[inputKey];
            key && inputResolve(key);
        }
    }
}

if (mobile) {
    msg = footerMsg;
    menus = dialog;
    status = header;
    document.body.style.position = "fixed";
    window.visualViewport.onresize = adjustFixedDivs;
    window.visualViewport.onscroll = adjustFixedDivs;
    createKb();
    adjustFixedDivs();
    container.onmouseup = e => {
        if (inputResolve) {
            const rect = curs.getBoundingClientRect();
            const cursX = rect.x + (rect.width / 2);
            const cursY = rect.y + (rect.height / 2);
            const x = e.x - cursX;
            const y = e.y - cursY;
            let key = {
                1: 'b',
                2: 'j',
                3: 'n',
                4: 'h',
                6: 'l',
                7: 'y',
                8: 'k',
                9: 'u',
            }[relativeCoordsToDrc(y, x)];
            const tolerance = 10;
            const center = getVisualCenter();
            if (e.target === curs) {
                autoLookAction = true;
                inputResolve(":".charCodeAt(0));
            } else if (Math.abs(center.x - cursX) > tolerance || Math.abs(center.y - cursY) > tolerance) {
                // if user has panned, auto travel
                autoQueue.splice(0, autoQueue.length);
                const coords = getCoordsFromElement(e.target);
                const cursCoords = getCoordsFromElement(curs);
                const horizKey = coords.x > cursCoords.x ? 'l' : 'h';
                const vertKey = coords.y > cursCoords.y ? 'j' : 'k';
                for (let i = 0; i < Math.abs(coords.x - cursCoords.x); i++) {
                    autoQueue.push(horizKey);
                }
                for (let i = 0; i < Math.abs(coords.y - cursCoords.y); i++) {
                    autoQueue.push(vertKey);
                }
                autoQueue.push(".");
                inputResolve("_".charCodeAt(0));
            } else {
                inputResolve(key.charCodeAt(0));
            }
        }
    };
} else {
    header.style.display = "none";
    footerMsg.style.display = "none";
    footer.style.display = "none";
    dialog.style.display = "none";
    document.onkeydown = e => handleKey(e.key, e.ctrlKey, e.location === 3);
}

for (let i = 0; i < rowno; i++) {
    for (let j = 0; j < colno; j++) {
        const div = document.createElement("div");
        div.id = `${j + 1}_${i}`;
        root.appendChild(div);
    }
}

root.style.width = `${colno * 12}px`;

function nethackStart(cb) {
    globalThis[cb.name] = cb;
    Module.preRun = function(obj) {
        const {FS, IDBFS} = obj;
        FS.mkdir('/save');
        FS.mount(IDBFS, {autoPersist: true}, '/save');
        FS.syncfs(true, err => {
            err && console.warn(err);
            synced = true;
            syncResolve();
        });
        storedFS = FS;
    };
    Module.onRuntimeInitialized = function() {
        Module.ccall(
            "shim_graphics_set_callback",
            null,
            ["string"],
            [cb.name],
            {async: true}
        );
    };
    factory(Module);
}

nethackStart(callback);

let winCount = 0;
let init = true;
const windows = [];

async function callback(name, ...args) {
    console.log(`---- ${name}: ${Array.from(args).join(", ")}`);

    if (init) {
        init = false;
        await syncPromise;
    }

    let key;
    let id;
    let menu;
    let menuText;
    let textId;
    let cmdIdx;

    if (autoLookAction) {
        if (name === "shim_raw_print") {
            autoLookMsgs.push(args[0]);
        } else if (name === "shim_putstr") {
            autoLookMsgs.push(args[2]);
        } else if (name === "shim_nhgetch" || name === "shim_nh_poskey") {
            let stairUp = false;
            let stairDown = false;
            let container = false;
            let items = false;
            for (const m of autoLookMsgs) {
                if (m.includes("staircase up")) {
                    stairUp = true;
                } else if (m.includes("staircase down")) {
                    stairDown = true;
                } else if (["sack", "bag", "box", "chest"].some(i => m.includes(i))) {
                    container = true;
                } else if (m.includes("see here") || m.includes("feel here") || m.includes("are here")) {
                    items = true;
                }
            }
            autoLookAction = false;
            autoLookMsgs.splice(0, autoLookMsgs.length);
            if (container) {
                autoQueue.push("#", "loot");
            } else if (stairDown) {
                autoQueue.push(">");
            } else if (stairUp) {
                autoQueue.push("<");
            } else if (items) {
                autoQueue.push(",");
            }
        } else if (name === "shim_display_nhwindow") {
            return 0;
        }
    }

    if (autoQueue.length) {
        if (name === "shim_get_ext_cmd") {
            cmdIdx = getExtCmdIdx(autoQueue.shift());
            return cmdIdx;
        }
        if (name === "shim_nhgetch" || name === "shim_nh_poskey") {
            msg.innerHTML = "";
            return autoQueue.shift().charCodeAt(0);
        } else if (name === "shim_select_menu") {
            return 0;
        }
    }

    switch(name) {
        case "shim_player_selection_or_tty":
            return true;
        case "shim_putstr":
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (mobile && menu) {
                textId = `${id}_text`;
                menuText = document.getElementById(textId);
                if (!menuText) {
                    menuText = document.createElement("div");
                    menuText.id = textId;
                    menu.appendChild(menuText);
                }
                menuText.innerHTML += "\n" + args[2];
            } else {
                msg.innerHTML += "\n" + args[2];
            }
            return 0;
        case "shim_raw_print":
            msg.innerHTML += "\n" + args[0];
            return 0;
        case "shim_status_update":
            updateStatus(args);
            return 0;
        case "shim_print_glyph":
            const x = args[1];
            const y = args[2];
            // typedef struct glyphinfo {
            //     int glyph;
            //     int ttychar;
            //     uint32 framecolor;
            //     glyph_map gm;
            // } glyph_info;
            // typedef struct glyph_map_entry {
            //     unsigned glyphflags;
            //     struct classic_representation sym;
            //     uint32 customcolor;
            //     uint16 color256idx;
            //     short int tileidx;
            // #ifdef ENHANCED_SYMBOLS
            //     struct unicode_representation *u;
            // #endif
            // } glyph_map;
            // struct classic_representation {
            //     int color;
            //     int symidx;
            // };
            // const c = String.fromCharCode(Module.getValue(args[3] + 4, 'i32'));
            const c = cp437toUnicode[Module.getValue(args[3] + 4, 'i32')];
            document.getElementById(`${x}_${y}`).innerHTML = c;
            // structs within structs are as is in memory, not as pointer
            const color = getColor(Module.getValue(args[3] + 16, 'i32'));
            document.getElementById(`${x}_${y}`).style.color = color;
            colorsByCoords[`${x}_${y}`] = color;
            return 0;
        case "shim_curs":
            if (curs) {
                curs.style.color = colorsByCoords[curs.id] || "";
                curs.style.backgroundColor = "";
            }
            curs = document.getElementById(`${args[1]}_${args[2]}`);
            curs.style.color = "black";
            curs.style.backgroundColor = cursColor;
            centerIfMobile();
            return 0;
        case "shim_create_nhwindow":
            winCount++;
            console.log(`create window ${winCount}`);
            const w = { id: winCount, type: args[0], selections: {} };
            windows.push(w);
            if (w.type === nethackGlobal.constants.WIN_TYPE.NHW_MENU) {
                id = `menu_${w.id}`;
                menu = document.getElementById(id);
                if (!menu) {
                    menu = document.createElement("div");
                    menu.id = id;
                    menu.style.whiteSpace = "pre-wrap";
                    menus.appendChild(menu);
                }
            }
            return winCount;
        case "shim_yn_function":
            let endStr = args[1] ? " [" + args[1] + "]" : ""; 
            msg.innerHTML += "\n" + args[0] + endStr;
            key = await new Promise(r => { inputResolve = r; });
            while (args[1] && !args[1].includes(String.fromCharCode(key))) {
                key = await new Promise(r => { inputResolve = r; });
            }
            inputResolve = undefined;
            msg.innerHTML = "";
            return key;
        // case "shim_message_menu":
        //     msg.innerHTML += "\n" + args[0]; // TODO is this needed?
        case "shim_nhgetch":
        case "shim_nh_poskey":
            key = await new Promise(r => { inputResolve = r; });
            inputResolve = undefined;
            msg.innerHTML = "";
            return key;
        case "shim_getmsghistory": // TODO
            return "";
        case "putmsghistory":
            return 0;
        case "shim_doprev_message":
            return 0;
        case "shim_get_ext_cmd":
            isCmdInput = true;
            msg.innerHTML = "#";
            cmdIdx = await new Promise(r => { inputResolve = r; });
            inputResolve = undefined;
            cmdInput = "";
            msg.innerHTML = "";
            isCmdInput = false;
            return cmdIdx;
        case "shim_display_nhwindow":
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (args[1] && mobile && menu) {
                openDialog(args[0]);
                key = await new Promise(r => { inputResolve = r; });
            }
            return 0;
        case "shim_destroy_nhwindow":
            destroyMenu(args[0]);
            const idx = windows.findIndex(w => w.id === args[0]);
            if (idx !== -1) {
                windows.splice(idx, 1);
            }
            return 0;
        case "shim_start_menu":
            if (args[1] === 1) {
                windows.find(w => w.id === args[0]).permInventory = true;
                id = `menu_${args[0]}`;
                menu = document.getElementById(id);
                if (menu) {
                    destroyMenu(args[0]); // no perm inventory for now
                }
            }
            return 0;
        case "shim_add_menu":
            if (windows.find(w => w.id === args[0]).permInventory) {
                return 0;
            }
            if (mobile) {
                addMenuMobile(args)
            } else {
                addMenu(args);
            }
            return 0;
        case "shim_select_menu":
            if (windows.find(w => w.id === args[0]).permInventory) {
                return 0;
            }
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (menu && mobile) {
                openDialog(args[0]);
            }
            const incomingSelections = await selectMenu(args);
            if (incomingSelections === -1 || incomingSelections === 0) {
                return incomingSelections;
            }
            return getMenuSelect(args[0], args[1], args[2], incomingSelections);
        case "shim_end_menu":
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            menuText = document.getElementById(`${id}_text`);
            if (menu) {
                if (mobile && menuText) {
                    menuText.innerHTML += "\n" + args[1];
                } else {
                    menu.innerHTML += "\n" + args[1];
                }
            }
            return 0;
        case "shim_clear_nhwindow":
            if (windows.find(w => w.type === nethackGlobal.constants.WIN_TYPE.NHW_MAP)?.id === args[0]) {
                clearMap();
            }
            return 0;
        case "shim_exit_nhwindows":
            clearMap();
            msg.innerHTML += "\n" + args[0];
            return 0;
        default:
            return 0;
    }
}

function clearMap() {
    for (let i = 0; i < rowno; i++) {
        for (let j = 0; j < colno; j++) {
            const e = document.getElementById(`${j + 1}_${i}`);
            if (e) {
                e.innerHTML = "";
            }
        }
        if (curs) {
            curs.style.backgroundColor = "";
        }
    }
}

function destroyMenu(windowId) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (menu) {
        delete selectorsByMenu[id];
        delete incSelectionsByMenu[id];
        menu.remove();
    }
    closeDialogIfEmpty();
}

function addMenu(args) {
    let id = `menu_${args[0]}`;
    let menu = document.getElementById(id);
    if (!menu) {
        menu = document.createElement("div");
        menu.id = id;
        menu.style.whiteSpace = "pre-wrap";
        menus.appendChild(menu);
    }
    let isPreSelect = args[8] & 0x00000001;
    let separator = isPreSelect ? " + " : " - ";
    if (!args[2]) {
        separator = "";
    }
    let selector = "";
    if (args[3]) {
        selector = args[3] ? String.fromCharCode(args[3]) : "";
    } else if (args[2]) { // selectable but need to handle selector options manually
        if (!selectorsByMenu[id]) {
            selector = getNextChar();
            selectorsByMenu[id] = [selector];
        } else {
            selector = getNextChar(selectorsByMenu[id][0]);
            selectorsByMenu[id].unshift(selector);
        }
    }
    if (isPreSelect) {
        if (!incSelectionsByMenu[id]) {
            incSelectionsByMenu[id] = [];
        }
        incSelectionsByMenu[id].push(selector.charCodeAt(0));
    }
    if (selector !== "") {
        windows.find(w => w.id === args[0]).selections[selector] = args[2];
    }
    menu.innerHTML += "\n" + selector + separator + escapeHtml(args[7]);
}

// TODO make cleaner
function updateMenuSelections(windowId, incomingSelections) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (!menu) {
        return;
    }
    let text = menu.innerHTML;
    let newText = "";
    const lines = text.split("\n");
    lines.shift(); // remove start empty line
    for (const line of lines) {
        if (line.substring(1, 4) !== " + " && line.substring(1, 4) !== " - ") {
            newText += "\n" + line;
        }else if (incomingSelections.includes(line.charCodeAt(0))) {
            newText += "\n" + line.charAt(0) + " + " + line.substring(4);
        } else {
            newText += "\n" + line.charAt(0) + " - " + line.substring(4);
        }
    }
    menu.innerHTML = newText;
}

function addMenuMobile(args) {
    let id = `menu_${args[0]}`;
    let textId = `${id}_text`;
    let menu = document.getElementById(id);
    let menuText = document.getElementById(textId);
    if (!menu) {
        menu = document.createElement("div");
        menu.id = id;
        menu.style.whiteSpace = "pre-wrap";
        menus.appendChild(menu);
    }
    if (!menuText) {
        menuText = document.createElement("div");
        menuText.id = textId;
        menu.appendChild(menuText);
    }
    let isPreSelect = args[8] & 0x00000001;
    let separator = isPreSelect ? " + " : " - ";
    if (!args[2]) {
        separator = "";
    }
    let selector = "";
    if (args[3]) {
        selector = args[3] ? String.fromCharCode(args[3]) : "";
    } else if (args[2]) { // selectable but need to handle selector options manually
        if (!selectorsByMenu[id]) {
            selector = getNextChar();
            selectorsByMenu[id] = [selector];
        } else {
            selector = getNextChar(selectorsByMenu[id][0]);
            selectorsByMenu[id].unshift(selector);
        }
    }
    if (isPreSelect) {
        if (!incSelectionsByMenu[id]) {
            incSelectionsByMenu[id] = [];
        }
        incSelectionsByMenu[id].push(selector.charCodeAt(0));
    }
    if (selector !== "") {
        windows.find(w => w.id === args[0]).selections[selector] = args[2];
    }
    const text = selector + separator + escapeHtml(args[7]);
    if (selector) {
        addDialogOption(selector, text, menu);
    } else {
        menuText.innerHTML += "\n" + text;
    }
}

function updateMenuSelectionsMobile(windowId, incomingSelections) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (!menu) {
        return;
    }
    const options = Array.from(menu.children)
        .filter(el => !el.id.endsWith("_text") && el.innerHTML !== 'Enter' && el.innerHTML !== 'Escape');
    for (const option of options) {
        let text = option.innerHTML;
        let newText = "";
        if (incomingSelections.includes(text.charCodeAt(0))) {
            newText += text.charAt(0) + " + " + text.substring(4);
        } else {
            newText += text.charAt(0) + " - " + text.substring(4);
        }
        option.innerHTML = newText;
    }
}

function updateStatus(args) {
    status.innerHTML = "";
    if (args[0] === nethackGlobal.constants.STATUS_FIELD.BL_CONDITION) {
        const conds = {};
        const mask = Module.getValue(args[1], 'i32');
        for (const cond of Object.keys(nethackGlobal.constants.blconditions)) {
            if (!isNaN(cond) || cond === "CONDITION_COUNT") {
                continue;
            }
            const val = nethackGlobal.constants.blconditions[cond];
            let condFormatted = cond.substring(3);
            condFormatted = condFormatted.charAt(0).toUpperCase() + condFormatted.substring(1);
            conds[condFormatted] = Math.pow(2, val) & mask;
        }
        condsMap = conds;
    } else if (args[0] !== nethackGlobal.constants.STATUS_FIELD.BL_RESET
        && args[0] !== nethackGlobal.constants.STATUS_FIELD.BL_FLUSH
    )  {
        for (const field of Object.keys(nethackGlobal.constants.STATUS_FIELD)) {
            if (args[0] === nethackGlobal.constants.STATUS_FIELD[field]) {
                let fieldFormatted = field.substring(3, 4) + field.substring(4).toLowerCase();
                statusMap[fieldFormatted] = Module.UTF8ToString(args[1])
                if (args[0] === nethackGlobal.constants.STATUS_FIELD.BL_GOLD) {
                    statusMap[fieldFormatted] = statusMap[fieldFormatted].split(":")[1]
                }
                break;
            }
        }
    }
    for (const field of Object.keys(statusMap)) {
        status.innerHTML += `${field}: ${statusMap[field] || "-"} `;
    }
    for (const cond of Object.keys(condsMap)) {
        if (condsMap[cond]) {
            status.innerHTML += `${cond} `;
        }
    }
    if (curs && statusMap["Hpmax"]) {
        const healthPercent = Number(statusMap["Hp"]) / Number(statusMap["Hpmax"]);
        if (healthPercent > 0.75) {
            curs.style.backgroundColor = "darkgreen";
        } else if (healthPercent > 0.5) {
            curs.style.backgroundColor = "yellow";
        } else if (healthPercent > 0.25) {
            curs.style.backgroundColor = "orange";
        } else {
            curs.style.backgroundColor = "red";
        }
        cursColor = curs.style.backgroundColor;
    }
}

//     const char *f_text;
// };
// extern struct ext_func_tab extcmdlist[];
// field bytes: 1, 4, 4, 4, 4, 4, with struct padding 4, 4, 4, 4, 4, 4
function getExtCmdIdx(input) {
    let str = 'dummy';
    const cmds = [];
    for (let i = 0; str !== ''; i += 24) {
        str = Module.UTF8ToString(Module.getValue(nethackGlobal.pointers.extcmdlist + i + 4, '*'));
        cmds.push(str);
    }
    return cmds.indexOf(input);
}

async function selectMenu(args) {
    let id = `menu_${args[0]}`;
    if (!incSelectionsByMenu[id]) {
        incSelectionsByMenu[id] = [];
    }
    let existingIdx = -1;
    let key;
    while (true) {
        key = await new Promise(r => { inputResolve = r; });
        if (key === 13) {
            break;
        }
        existingIdx = incSelectionsByMenu[id].indexOf(key);
        if (key === 27) {
            incSelectionsByMenu[id] = [];
            destroyMenu(args[0]);
            return -1;
        } else if (existingIdx !== -1) {
            incSelectionsByMenu[id].splice(existingIdx, 1);
        } else {
            incSelectionsByMenu[id].push(key);
        }
        if (mobile) {
            updateMenuSelectionsMobile(args[0], incSelectionsByMenu[id]);
        } else {
            updateMenuSelections(args[0], incSelectionsByMenu[id]);
        }
        if (args[1] === nethackGlobal.constants.MENU_SELECT.PICK_ONE) {
            break;
        }
    }
    inputResolve = undefined;
    if (args[1] === nethackGlobal.constants.MENU_SELECT.PICK_NONE) {
        return 0;
    }
    let incomingSelections = incSelectionsByMenu[id];
    incSelectionsByMenu[`menu_${args[0]}`] = [];
    return incomingSelections;
}

function getMenuSelect(window, how, selected, incomingSelections) {
    destroyMenu(window);
    const validSelections = [];
    for (const inc of incomingSelections) {
        const selection = windows.find(w => w.id === window).selections[String.fromCharCode(inc)];
        if (!selection) {
            continue;
        }
        validSelections.push(selection);
    }
    if (!validSelections.length) {
        return 0;
    }
    const ptr = Module._malloc(20 * validSelections.length);
    let i = 0;
    for (const v of validSelections) {
        Module.setValue(ptr + i, v, 'i64');
        Module.setValue(ptr + i + 8, -1, 'i32'); // TODO for now always set "-1" meaning "all"
        i += 16;
    }
    Module.setValue(selected, ptr, '*');
    return validSelections.length;
}

function getNextChar(char) {
    if (!char) {
        return "a";
    }
    const code = char.charCodeAt(0) + 1;
    if (code > "z".charCodeAt(0)) {
        return "A";
    }
    return String.fromCharCode(code);
}

function escapeHtml(str) {
    return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function relativeCoordsToDrc(y, x) {
    if (x === 0) {
        if (y > 0) return 2; // b
        return 8; // t
    } else {
        let val = y/x;

        if (val > -0.4142 && val < 0.4142) {
            if (x > 0) return 6; // r
            return 4; // l
        } else if (val > -2.4142 && val < -0.4142) {
            if (x > 0) return 9; // tr
            return 1; // bl
        } else if (val > 0.4142 && val < 2.4142) {
            if (x > 0) return 3; // br
            return 7; // tl
        } else {
            if (y > 0) return 2; // b
            return 8; // t
        }
    }
}

function adjustFixedDivs() {
    const { offsetTop, offsetLeft, height, width, scale } = window.visualViewport;
    if (dialogOn) {
        dialog.style.top = `${offsetTop}px`;
        dialog.style.left = `${offsetLeft}px`;
        dialog.style.height = `${height * 0.98}px`;
        dialog.style.width = `${width * 0.98}px`;
        for (const el of Array.from(dialog.children)) {
            el.style.width = `${width * 0.88}px`;
            el.style.margin = `${width * 0.01}px`;
            el.style.padding = `${width * 0.02}px`;
        }
        return;
    }
    header.style.top = `${offsetTop}px`;
    header.style.left = `${offsetLeft}px`;
    header.style.height = `${height * 0.1}px`;
    header.style.width = `${width * 0.98}px`;
    if (mobileKbOn) {
        footerMsg.style.top = `${(offsetTop + (height * 0.43))}px`;
        footerMsg.style.left = `${offsetLeft}px`;
        footerMsg.style.height = `${height * 0.15}px`;
        footerMsg.style.width = `${width * 0.98}px`;
        footer.style.top = `${(offsetTop + (height * 0.59))}px`;
        footer.style.left = `${offsetLeft}px`;
        footer.style.height = `${height * 0.4}px`;
        footer.style.width = `${width * 0.98}px`;
        footerHeight = height * 0.4;
        for (const row of Array.from(footer.children)) {
            row.style.height = `${height * 0.1}px`;
            row.style.width = `${width * 0.98}px`;
        }
    } else {
        footerMsg.style.top = `${(offsetTop + (height * 0.74))}px`;
        footerMsg.style.left = `${offsetLeft}px`;
        footerMsg.style.height = `${height * 0.15}px`;
        footerMsg.style.width = `${width * 0.98}px`;
        footer.style.top = `${(offsetTop + (height * 0.89))}px`;
        footer.style.left = `${offsetLeft}px`;
        footer.style.height = `${height * 0.1}px`;
        footer.style.width = `${width * 0.98}px`;
        footerHeight = height * 0.1;
    }
    rootBaseMarginTop = offsetTop + height * 0.1;
    if (lockCamera) {
        centerIfMobile();
    }
}

function getVisualCenter() {
    return {
        x: window.visualViewport.width / 2 + window.visualViewport.offsetLeft,
        y: (window.visualViewport.height - footerHeight) / 2 + window.visualViewport.offsetTop
    };
}

function getCoordsFromElement(el) {
    const coords = el.id.split("_");
    return {
        x: Number(coords[0]),
        y: Number(coords[1])
    };
}

function centerIfMobile() {
    if (mobile && curs) {
        const center = getVisualCenter();
        const rect = curs.getBoundingClientRect();
        const cursX = rect.x + (rect.width / 2);
        const cursY = rect.y + (rect.height / 2);
        const prevMarginLeft = Number(root.style.marginLeft?.slice(0, -2));
        const prevMarginTop = Number(root.style.marginTop?.slice(0, -2));
        root.style.marginLeft = `${prevMarginLeft + (center.x - cursX)}px`;
        root.style.marginTop = `${prevMarginTop + (center.y - cursY)}px`;
    }
}

function openDialog(windowId) {
    const menu = document.getElementById(`menu_${windowId}`);
    if (menu) {
        dialog.style.display = "";
        dialogOn = true;
        for (const option of ['Enter', 'Escape']) {
            addDialogOption(option, option, menu);
        }
        adjustFixedDivs();
    }
}

function addDialogOption(option, text, menu) {
    const el = document.createElement("div");
    el.style.border = "1px solid lightgray";
    el.style.backgroundColor = "black";
    el.style.display = "flex";
    el.style.flexDirection = "column";
    el.style.justifyContent = "center";
    el.style.alignItems = "start";
    el.style.padding = "10px";
    el.style.margin = "5px";
    el.innerHTML = text;
    el.onclick = () => {
        handleKey(option, false);
    };
    menu.appendChild(el);
}

function closeDialogIfEmpty() {
    if (mobile && !Array.from(dialog.children).some(el => el.id?.startsWith("menu"))) {
        dialogOn = false;
        dialog.innerHTML = "";
        dialog.style.display = "none";
        adjustFixedDivs();
    }
}

function createMobileControls() {
    const chars = ['Kb', 'CmrLck', 'CmrRst'];
    footer.innerHTML = "";
    footer.style.flexDirection = "row";
    for (const char of chars) {
        const el = document.createElement("div");
        el.style.display = "flex";
        el.style.flexDirection = "column";
        el.style.justifyContent = "center";
        el.style.alignItems = "center";
        el.style.padding = "10px";
        el.style.margin = "5px";
        el.style.aspectRatio = "1 / 1";
        el.style.border = "1px solid lightgray";
        el.style.backgroundColor = "black";
        el.innerHTML = char;
        el.onmousedown = () => {
            if (char === 'Kb') {
                mobileKbOn = !mobileKbOn;
                createKb();
                adjustFixedDivs();
            } else if (char === 'CmrRst') {
                root.style.marginLeft = 0;
                root.style.marginTop = rootBaseMarginTop;
            } else if (char === 'CmrLck') {
                lockCamera = !lockCamera;
                el.style.backgroundColor = lockCamera ? "#555" : "black";
                if (lockCamera) {
                    centerIfMobile();
                }
            }
        };
        footer.appendChild(el);
    }
}

function createKb(idx = 0) {
    const keys = [
        [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['Ctrl', 'Shift', 'z', 'x', 'c', 'v', 'b', 'n', 'm'],
            ['Kb', 'Sym', 'Spc', 'Esc', 'Entr']
        ],
        [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['Ctrl', 'Shift', 'Z', 'X', 'C', 'V', 'B', 'N', 'M'],
            ['Kb', 'Sym', 'Spc', 'Esc', 'Entr']
        ],
        [
            ['`', '\\', '$', '=', '/', '_', '<', '>', '[', ']'],
            ['!', '@', '#', '?', '%', '^', '&', '*', '(', ')'],
            ['Ctrl', '123', '-', '\'', '"', ':', ';', ',', '.'],
            ['Kb', 'abc', 'Spc', 'Esc', 'Entr']
        ],
        [
            ['7', '8', '9'],
            ['4', '5', '6'],
            ['1', '2', '3'],
            ['Kb', 'Ctrl', 'abc', '0', 'Esc', 'Entr']
        ]
    ];
    footer.innerHTML = "";
    footer.style.flexDirection = "column";
    for (const row of keys[idx]) {
        const rowEl = document.createElement("div");
        rowEl.style.display = "flex";
        rowEl.style.flexDirection = "row";
        rowEl.style.justifyContent = "space-between";
        rowEl.style.position = "relative";
        for (const char of row) {
            const el = document.createElement("div");
            el.style.display = "flex";
            el.style.flexDirection = "column";
            el.style.justifyContent = "center";
            el.style.alignItems = "center";
            el.style.width = "100%";
            el.style.height = "100%";
            el.style.overflow = "hidden";
            el.style.border = "1px solid lightgray";
            el.style.backgroundColor = "black";
            if (idx === 1 && char === 'Shift' || ctrl && char === 'Ctrl') {
                el.style.backgroundColor = "#555";
            }
            el.innerHTML = char;
            el.onmousedown = () => {
                if (char === 'Kb') {
                    mobileKbOn = !mobileKbOn;
                    createMobileControls();
                    adjustFixedDivs();
                } else if (char === 'Shift') {
                    if (idx === 0) {
                        createKb(1);
                        adjustFixedDivs();
                    } else {
                        createKb(0);
                        adjustFixedDivs();
                    }
                } else if (char === 'Ctrl') {
                    ctrl = !ctrl;
                    el.style.backgroundColor = ctrl ? "#555" : "black";
                } else if (char === 'Sym') {
                    createKb(2);
                    adjustFixedDivs();
                } else if (char === 'abc') {
                    createKb(0);
                    adjustFixedDivs();
                } else if (char === '123') {
                    createKb(3);
                    adjustFixedDivs();
                } else {
                    el.style.backgroundColor = "#555";
                    setTimeout(() => {
                        el.style.backgroundColor = "black";
                    }, 100);
                    if (idx === 1) {
                        createKb(0);
                        adjustFixedDivs();
                    }
                    if (char === 'Esc') {
                        handleKey('Escape', ctrl);
                    } else if (char === 'Entr') {
                        handleKey('Enter', ctrl);
                    } else if (char === 'Spc') {
                        handleKey(' ', ctrl);
                    } else {
                        handleKey(char, ctrl);
                    }
                }
            };
            rowEl.appendChild(el);
        }
        footer.appendChild(rowEl);
    }
}
