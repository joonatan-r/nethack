<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Nethack</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Courier, monospace;
            font-size: 20px;
            user-select: none;
        }
        #root div {
            float: left;
            width: 20px;
            height: 20px;
        }
        #msg {
            white-space: pre;
        }
        #container {
            display: flex;
            flex-direction: column;
        }
    </style>

  <body>
    <div id="container">
        <div id="status"></div>
        <div id="root"></div>
        <div id="msg"></div>
        <div id="menus"></div>
    </div>
  </body>
  <script type="module" src="./wasm/nethack.js"></script>
  <script type="module">

import factory from "./wasm/nethack.js";

let synced = false;
let syncResolve;
const syncPromise = new Promise(r => { syncResolve = r; });
const Module = {};
let storedFS;
let inputResolve;
let isCmdInput = false;
let cmdInput = "";
const rowno = 21;
const colno = 80;
let curs;
const selectorsByMenu = {};
const incSelectionsByMenu = {};
const statusMap = {};
let condsMap = {}

document.onkeydown = e => {
    if (inputResolve) {
        if (isCmdInput) {
            if (e.key === 'Enter') {
                inputResolve(getExtCmdIdx(cmdInput));
            } else if (e.key === 'Escape') {
                inputResolve(-1);
            } else if (e.key.length === 1) {
                cmdInput += e.key;
                msg.innerHTML = "#" + cmdInput;
            }
        } else if (e.key.length === 1) {
            let key = {
                1: 'b',
                2: 'j',
                3: 'n',
                4: 'h',
                6: 'l',
                7: 'y',
                8: 'k',
                9: 'u',
            }[e.key] || e.key;
            let code = key.charCodeAt(0);
            if (e.ctrlKey) {
                code -= 96;
            }
            inputResolve(code);
        } else {
            let key = {
                Escape: 27,
                Enter: 13,
                End: 'B'.charCodeAt(0),
                ArrowDown: 'J'.charCodeAt(0),
                PageDown: 'N'.charCodeAt(0),
                ArrowLeft: 'H'.charCodeAt(0),
                ArrowRight: 'L'.charCodeAt(0),
                Home: 'Y'.charCodeAt(0),
                ArrowUp: 'K'.charCodeAt(0),
                PageUp: 'U'.charCodeAt(0)
            }[e.key];
            key && inputResolve(key);
        }
    }
};

const msg = document.getElementById("msg");
const root = document.getElementById("root");
const menus = document.getElementById("menus");
const status = document.getElementById("status");

for (let i = 0; i < rowno; i++) {
    for (let j = 0; j < colno; j++) {
        const div = document.createElement("div");
        div.id = `${j + 1}_${i}`;
        root.appendChild(div);
    }
}

root.style.width = `${colno * 20}px`;

function nethackStart(cb) {
    globalThis[cb.name] = cb;
    Module.preRun = function(obj) {
        const {FS, IDBFS} = obj;
        FS.mkdir('/save');
        FS.mount(IDBFS, {autoPersist: true}, '/save');
        FS.syncfs(true, err => {
            err && console.warn(err);
            synced = true;
            syncResolve();
        });
        storedFS = FS;
    };
    Module.onRuntimeInitialized = function() {
        Module.ccall(
            "shim_graphics_set_callback",
            null,
            ["string"],
            [cb.name],
            {async: true}
        );
    };
    factory(Module);
}

nethackStart(callback);

let winCount = 0;
let init = true;
const windows = [];

async function callback(name, ...args) {
    console.log(`---- ${name}: ${Array.from(args).join(", ")}`);

    if (init) {
        init = false;
        await syncPromise;
    }

    let key;
    let id;
    let menu;
    let cmdIdx;
    switch(name) {
        case "shim_player_selection_or_tty":
            return true;
        case "shim_putstr":
            msg.innerHTML += "\n" + args[2];
            return 0;
        case "shim_raw_print":
            msg.innerHTML += "\n" + args[0];
            return 0;
        case "shim_status_update":
            updateStatus(args);
            return 0;
        case "shim_print_glyph":
            const x = args[1];
            const y = args[2];
            // typedef struct glyphinfo {
            //     int glyph;
            //     int ttychar;
            //     uint32 framecolor;
            //     glyph_map gm;
            // } glyph_info;
            const c = String.fromCharCode(Module.getValue(args[3] + 4, 'i32'));
            document.getElementById(`${x}_${y}`).innerHTML = c;
            return 0;
        case "shim_curs":
            if (curs) {
                curs.style.color = "";
                curs.style.backgroundColor = "";
            }
            curs = document.getElementById(`${args[1]}_${args[2]}`);
            curs.style.color = "black";
            curs.style.backgroundColor = "darkgreen";
            return 0;
        case "shim_create_nhwindow":
            winCount++;
            console.log(`create window ${winCount}`);
            windows.push({ id: winCount, type: args[0], selections: {} });
            return winCount;
        case "shim_yn_function":
            let endStr = args[1] ? " [" + args[1] + "]" : ""; 
            msg.innerHTML += "\n" + args[0] + endStr;
            key = await new Promise(r => { inputResolve = r; });
            while (args[1] && !args[1].includes(String.fromCharCode(key))) {
                key = await new Promise(r => { inputResolve = r; });
            }
            inputResolve = undefined;
            msg.innerHTML = "";
            return key;
        // case "shim_message_menu":
        //     msg.innerHTML += "\n" + args[0]; // TODO is this needed?
        case "shim_nhgetch":
        case "shim_nh_poskey":
            key = await new Promise(r => { inputResolve = r; });
            inputResolve = undefined;
            msg.innerHTML = "";
            return key;
        case "shim_getmsghistory":
            return "";
        case "shim_get_ext_cmd":
            isCmdInput = true;
            msg.innerHTML = "#";
            cmdIdx = await new Promise(r => { inputResolve = r; });
            inputResolve = undefined;
            cmdInput = "";
            msg.innerHTML = "";
            isCmdInput = false;
            return cmdIdx;
        case "shim_destroy_nhwindow":
            destroyMenu(args[0]);
            const idx = windows.findIndex(w => w.id === args[0]);
            if (idx !== -1) {
                windows.splice(idx, 1);
            }
            return 0;
        case "shim_start_menu":
            if (args[1] === 1) {
                windows.find(w => w.id === args[0]).permInventory = true;
            }
            return 0;
        case "shim_add_menu":
            if (windows.find(w => w.id === args[0]).permInventory) {
                return 0;
            }
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (!menu) {
                menu = document.createElement("div");
                menu.id = id;
                menu.style.whiteSpace = "pre";
                menus.appendChild(menu);
            }
            let isPreSelect = args[8] & 0x00000001;
            let separator = isPreSelect ? " + " : " - ";
            if (!args[2]) {
                separator = "";
            }
            let selector = "";
            if (args[3]) {
                selector = args[3] ? String.fromCharCode(args[3]) : "";
            } else if (args[2]) { // selectable but need to handle selector options manually
                if (!selectorsByMenu[id]) {
                    selector = "a";
                    selectorsByMenu[id] = [selector];
                } else {
                    selector = String.fromCharCode(selectorsByMenu[id][0].charCodeAt(0) + 1);
                    selectorsByMenu[id].unshift(selector);
                }
            }
            if (isPreSelect) {
                if (!incSelectionsByMenu[id]) {
                    incSelectionsByMenu[id] = [];
                }
                incSelectionsByMenu[id].push(selector.charCodeAt(0));
            }
            windows.find(w => w.id === args[0]).selections[selector] = args[2];
            menu.innerHTML += "\n" + selector + separator + escapeHtml(args[7]);
            return 0;
        case "shim_select_menu":
            id = `menu_${args[0]}`;
            if (!incSelectionsByMenu[id]) {
                incSelectionsByMenu[id] = [];
            }
            if (windows.find(w => w.id === args[0]).permInventory) {
                return 0;
            }
            let existingIdx = -1;
            while (key !== 13) {
                key = await new Promise(r => { inputResolve = r; });
                existingIdx = incSelectionsByMenu[id].indexOf(key);
                console.log("\n\n");
                console.log(String.fromCharCode(key));
                console.log(existingIdx);
                if (key === 27) {
                    incSelectionsByMenu[id] = [];
                    destroyMenu(args[0]);
                    return -1;
                } else if (existingIdx !== -1) {
                    incSelectionsByMenu[id].splice(existingIdx, 1);
                } else {
                    incSelectionsByMenu[id].push(key);
                }
                console.log(incSelectionsByMenu[id]);
                updateMenuSelections(args[0], incSelectionsByMenu[id]);
                console.log("\n\n");
                if (args[1] === nethackGlobal.constants.MENU_SELECT.PICK_ONE) {
                    break;
                }
            }
            inputResolve = undefined;
            if (args[1] === nethackGlobal.constants.MENU_SELECT.PICK_NONE) {
                return 0;
            }
            let incomingSelections = incSelectionsByMenu[id];
            incSelectionsByMenu[`menu_${args[0]}`] = [];
            return getMenuSelect(args[0], args[1], args[2], incomingSelections);
        case "shim_end_menu":
            id = `menu_${args[0]}`;
            menu = document.getElementById(id);
            if (menu) {
                menu.innerHTML += "\n" + args[1];
            }
            return 0;
        case "shim_clear_nhwindow":
            if (windows.find(w => w.type === nethackGlobal.constants.WIN_TYPE.NHW_MAP)?.id === args[0]) {
                clearMap();
            }
            return 0;
        case "shim_exit_nhwindows":
            clearMap();
            msg.innerHTML += "\n" + args[0];
            return 0;
        default:
            return 0;
    }
}

function clearMap() {
    for (let i = 0; i < rowno; i++) {
        for (let j = 0; j < colno; j++) {
            const e = document.getElementById(`${j + 1}_${i}`);
            if (e) {
                e.innerHTML = "";
            }
        }
    }
}

function destroyMenu(windowId) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (menu) {
        delete selectorsByMenu[id];
        delete incSelectionsByMenu[id];
        menu.remove();
    }
}

// TODO make cleaner
function updateMenuSelections(windowId, incomingSelections) {
    const id = `menu_${windowId}`;
    const menu = document.getElementById(id);
    if (!menu) {
        return;
    }
    let text = menu.innerHTML;
    let newText = "";
    const lines = text.split("\n");
    lines.shift(); // remove start empty line
    for (const line of lines) {
        if (line.substring(1, 4) !== " + " && line.substring(1, 4) !== " - ") {
            newText += "\n" + line;
        }else if (incomingSelections.includes(line.charCodeAt(0))) {
            newText += "\n" + line.charAt(0) + " + " + line.substring(4);
        } else {
            newText += "\n" + line.charAt(0) + " - " + line.substring(4);
        }
    }
    menu.innerHTML = newText;
}

function updateStatus(args) {
    status.innerHTML = "";
    if (args[0] === nethackGlobal.constants.STATUS_FIELD.BL_CONDITION) {
        const conds = {};
        const mask = Module.getValue(args[1], 'i32');
        for (const cond of Object.keys(nethackGlobal.constants.blconditions)) {
            if (!isNaN(cond) || cond === "CONDITION_COUNT") {
                continue;
            }
            const val = nethackGlobal.constants.blconditions[cond];
            let condFormatted = cond.substring(3);
            condFormatted = condFormatted.charAt(0).toUpperCase() + condFormatted.substring(1);
            conds[condFormatted] = Math.pow(2, val) & mask;
        }
        condsMap = conds;
    } else if (args[0] !== nethackGlobal.constants.STATUS_FIELD.BL_RESET
        && args[0] !== nethackGlobal.constants.STATUS_FIELD.BL_FLUSH
    )  {
        for (const field of Object.keys(nethackGlobal.constants.STATUS_FIELD)) {
            if (args[0] === nethackGlobal.constants.STATUS_FIELD[field]) {
                let fieldFormatted = field.substring(3, 4) + field.substring(4).toLowerCase();
                statusMap[fieldFormatted] = Module.UTF8ToString(args[1])
                if (args[0] === nethackGlobal.constants.STATUS_FIELD.BL_GOLD) {
                    statusMap[fieldFormatted] = statusMap[fieldFormatted].split(":")[1]
                }
                break;
            }
        }
    }
    for (const field of Object.keys(statusMap)) {
        status.innerHTML += `${field}: ${statusMap[field] || "-"} `;
    }
    for (const cond of Object.keys(condsMap)) {
        if (condsMap[cond]) {
            status.innerHTML += `${cond} `;
        }
    }
}

// field bytes: 1, 4, 4, 4, 4, 4, with struct padding 4, 4, 4, 4, 4, 4
function getExtCmdIdx(input) {
    let str = 'dummy';
    const cmds = [];
    for (let i = 0; str !== ''; i += 24) {
        str = Module.UTF8ToString(Module.getValue(nethackGlobal.pointers.extcmdlist + i + 4, '*'));
        cmds.push(str);
    }
    return cmds.indexOf(input);
}

// 8, 8, 4
function getMenuSelect(window, how, selected, incomingSelections) {
    destroyMenu(window);
    const validSelections = [];
    for (const inc of incomingSelections) {
        const selection = windows.find(w => w.id === window).selections[String.fromCharCode(inc)];
        if (!selection) {
            continue;
        }
        validSelections.push(selection);
    }
    if (!validSelections.length) {
        return 0;
    }
    const ptr = Module._malloc(20 * validSelections.length);
    let i = 0;
    for (const v of validSelections) {
        Module.setValue(ptr + i, v, 'i64');
        i += 20;
    }
    Module.setValue(selected, ptr, '*');
    return validSelections.length;
}

function escapeHtml(str) {
    return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
